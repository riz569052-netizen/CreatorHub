<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Tools</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Creator Tools</h1>
    <p>All-in-One Tools for Content Creators</p>
  </header>

  <main>

    <div class="card">
      <h2>📥 Instagram Reels Downloader</h2>
      <input type="text" id="instaLink" placeholder="Paste Instagram Reel Link">
      <button onclick="downloadInstagram()">Download</button>
    </div>

    <div class="card">
      <h2>📥 YouTube Shorts Downloader</h2>
      <input type="text" id="shortsLink" placeholder="Paste YouTube Shorts Link">
      <button onclick="downloadShorts()">Download</button>
    </div>

    <div class="card">
      <h2>📝 YouTube Video Caption Generator</h2>
      <input type="text" id="videoLink" placeholder="Paste YouTube Video Link">
      <button onclick="generateCaption()">Generate Caption</button>

      <div id="captionResult"></div>
    </div>

  </main>

  <footer>
    <p>© 2026 Creator Tools</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
